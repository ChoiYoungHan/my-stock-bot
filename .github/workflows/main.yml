name: Hourly Stock Scanner

on:
  schedule:
    # 한국 시간 기준: 08:37, 09:37, 10:37, 11:37, 12:37, 13:37, 14:37, 15:37 실행
    # UTC 기준: 23:37 (전날), 00:37, 01:37, 02:37, 03:37, 04:37, 05:37, 06:37
    - cron: '37 23,0,1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: # 직접 버튼 눌러서 테스트하기 용도

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Dependencies
        run: pip install finance-datareader yfinance pandas requests
      - name: Execute
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_rec.py
