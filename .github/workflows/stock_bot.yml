name: Hourly Stock Scanner

on:
  schedule:
    # 한국 시간 기준: 08:55, 09:55, 10:55, 11:55, 12:55, 13:55, 14:55, 15:55 실행
    # UTC 기준: 23:55 (전날), 00:55, 01:55, 02:55, 03:55, 04:55, 05:55, 06:55
    - cron: '55 23,0,1,2,3,4,5,6 * * 1-5'
  workflow_dispatch: 

jobs:
  run-scanner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Dependencies
        run: pip install finance-datareader yfinance pandas requests
      - name: Execute
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stock_rec.py
